name: Deploy J-Space Gallery to Pages

# Publishes the zero-GPU static platform (apps/site) plus the recorded traces
# (results/traces) to GitHub Pages. See docs/platform-plan.md (P2).

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "results/traces/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -eux
          mkdir -p _site
          cp -R apps/site/. _site/
          # Bundle traces next to the pages so relative "traces/..." fetches work.
          if [ -d results/traces ]; then
            mkdir -p _site/traces
            cp -R results/traces/. _site/traces/
          fi
          # Jekyll off: serve files as-is (needed for paths with no processing).
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
